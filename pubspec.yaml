name: flutter_basicconfig
description: "A new Flutter project."
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.5.1
  lottie: ^3.3.1
  dots_indicator: ^4.0.1
  iconify_flutter: ^0.0.7

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^16.0.0
  sidebarx: ^0.17.1

  # Network & API
  dio: ^5.7.0
  retrofit: 4.4.1
  retrofit_generator: 8.2.1
  connectivity_plus: ^6.1.4
  pretty_dio_logger: ^1.4.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.6.3

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.2

  # Database
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.1

  # Functional Programming
  dartz: ^0.10.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  crypto: ^3.0.6
  device_info_plus: ^11.1.1
  android_id: ^0.4.0
  email_validator: ^3.0.0
  synchronized: ^3.3.0+3
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/lottie/
    - lib/mocks/auth/